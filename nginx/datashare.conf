# ─── Frontend : datashare.gourouvin.dev ───────────────────────────────────────

server {
    listen 80;
    server_name datashare.gourouvin.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name datashare.gourouvin.dev;

    ssl_certificate /etc/letsencrypt/live/datashare.gourouvin.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datashare.gourouvin.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/datashare;
    index index.html;

    # React Router : toujours renvoyer index.html pour les routes SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ─── API : api.datashare.gourouvin.dev ────────────────────────────────────────

server {
    listen 80;
    server_name api.datashare.gourouvin.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.datashare.gourouvin.dev;

    ssl_certificate /etc/letsencrypt/live/api.datashare.gourouvin.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.datashare.gourouvin.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload de fichiers volumineux (1 Go max selon .env.example)
        client_max_body_size 1024m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}