name: Deploy Frontend to Lightsail

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Compress build
        run: tar -czf datashare-frontend.tar.gz -C frontend/dist .

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: datashare-frontend.tar.gz
          target: /tmp/

      - name: Extract and deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            mkdir -p /tmp/datashare-frontend-deploy /var/www/datashare
            tar -xzf /tmp/datashare-frontend.tar.gz -C /tmp/datashare-frontend-deploy
            sudo rsync -a --delete /tmp/datashare-frontend-deploy/ /var/www/datashare/
            sudo chown -R www-data:www-data /var/www/datashare
            rm -rf /tmp/datashare-frontend-deploy /tmp/datashare-frontend.tar.gz